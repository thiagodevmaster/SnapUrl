name: CI - SnapUrl

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Start Sail
        run: ./vendor/bin/sail up -d --build

      - name: Wait for MySQL
        run: |
          until ./vendor/bin/sail exec mysql mysqladmin ping -h mysql --silent; do
            echo "Waiting for MySQL..."
            sleep 3
          done

      - name: Prepare App
        run: |
          ./vendor/bin/sail artisan key:generate
          ./vendor/bin/sail artisan migrate --force

      - name: Run Tests
        run: ./vendor/bin/sail artisan test

      - name: Smoke Test
        run: |
          sleep 10
          echo "Checking containers"
          bash ./vendor/bin/sail ps
          echo "Trying to connect...."
          curl --fail --retry 3 --retry-delay 5 --retry-all-errors http://127.0.0.1:80 || exit 1

      - name: Cleanup
        if: always()
        run: ./vendor/bin/sail down -v